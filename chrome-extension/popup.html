<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      color: #1f1f1f;
      background: #fff;
    }

    .header {
      padding: 14px 16px;
      border-bottom: 1px solid #e3e3e3;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-title { font-size: 14px; font-weight: 500; }
    .header-sub { font-size: 11px; color: #b3b3b3; margin-top: 2px; }

    .badge {
      background: #1f1f1f;
      color: #fff;
      border-radius: 20px;
      padding: 3px 10px;
      font-size: 12px;
      font-weight: 500;
    }
    .badge.empty { background: #f0f0f0; color: #b3b3b3; }

    .list { max-height: 280px; overflow-y: auto; }

    .empty {
      padding: 36px 20px;
      text-align: center;
      color: #b3b3b3;
      font-size: 13px;
      line-height: 1.6;
    }

    .item {
      padding: 11px 16px;
      border-bottom: 1px solid #f5f5f5;
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }

    .item-num {
      font-size: 11px;
      color: #b3b3b3;
      padding-top: 2px;
      flex-shrink: 0;
      width: 16px;
    }

    .item-body { flex: 1; min-width: 0; }

    .item-path {
      font-size: 11px;
      color: #b3b3b3;
      font-family: monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 3px;
    }

    .item-text { font-size: 13px; color: #1f1f1f; line-height: 1.4; }

    .item-del {
      background: none;
      border: none;
      color: #d4d4d4;
      cursor: pointer;
      font-size: 14px;
      padding: 0;
      flex-shrink: 0;
      line-height: 1;
    }

    .item-del:hover { color: #dc2626; }

    .actions {
      padding: 12px 16px;
      display: flex;
      gap: 8px;
      border-top: 1px solid #e3e3e3;
    }

    .btn-send {
      flex: 1;
      background: #1f1f1f;
      color: #fff;
      border: none;
      border-radius: 20px;
      padding: 10px;
      font-size: 13px;
      cursor: pointer;
      font-family: inherit;
      font-weight: 500;
      transition: background 0.15s;
    }

    .btn-send:hover:not(:disabled) { background: #000; }

    .btn-send:disabled {
      background: #f0f0f0;
      color: #b3b3b3;
      cursor: not-allowed;
    }

    .btn-clear {
      background: #fff;
      border: 1px solid #e3e3e3;
      border-radius: 20px;
      padding: 10px 14px;
      font-size: 13px;
      cursor: pointer;
      color: #5a5a5a;
      font-family: inherit;
    }

    .btn-clear:hover { background: #f5f5f5; }

    .status {
      padding: 8px 16px 12px;
      font-size: 12px;
      text-align: center;
      min-height: 28px;
    }

    .ok  { color: #16a34a; }
    .err { color: #dc2626; }
  </style>
</head>
<body>
  <div class="header">
    <div>
      <div class="header-title">Portfolio Review</div>
      <div class="header-sub">injae.me</div>
    </div>
    <span class="badge empty" id="badge">0</span>
  </div>

  <div class="list" id="list">
    <div class="empty">
      Nenhum comentário ainda.<br />
      Clique em 💬 na página para<br />ativar o modo de revisão.
    </div>
  </div>

  <div class="actions">
    <button class="btn-send" id="send" disabled>Enviar para Claude</button>
    <button class="btn-clear" id="clear">Limpar</button>
  </div>
  <div class="status" id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
